<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>POKÉMON • BY TYPE</title>
  <link rel="stylesheet" th:href="@{/pokemon.css}">
  <link rel="stylesheet" href="../static/pokemon.css">
</head>
<body>
<div class="container">

  <header>
    <div class="brand">
      <div class="pixel-icon" aria-hidden="true"></div>
      <div>
        <h1>All Fire Pokemon</h1>
        <div class="sub">FILTER BY PRIMARY TYPE</div>
      </div>
    </div>

    <nav>
      <a th:href="@{/fire}">Fire</a>
      <a th:href="@{/type-select}">BY TYPE</a>
    </nav>
  </header>


  <div class="card">
    <div class="row">
      <span class="badge">TYPE</span>
      <span class="type">
          Fire
        </span>

      <span class="badge"
            th:if="${firePokemons != null}"
            th:text="${#lists.size(firePokemons)} + ' FOUND'">
          0 FOUND
        </span>
    </div>

    <table class="table" th:if="${firePokemons != null and !#lists.isEmpty(firePokemons)}">
      <thead>
      <tr>
        <th>#</th>
        <th>NAME</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="p : ${firePokemons}">
        <td th:text="${p.pokedexNumber}">25</td>
        <td>
          <span th:text="${p.name}">PIKACHU></span>
        </td>

      </tr>
      </tbody>
    </table>
  </div>
  <footer class="footer">
    <p>POKÉDEX TERMINAL • TRAINERS WELCOME</p>
    <p class="small">Built with Spring Boot & Thymeleaf</p>
  </footer>

</div>


</body>
</html>
